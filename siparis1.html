<!DOCTYPE html>
<html lang="tr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Suveren Saha Satış</title>
 <!-- html2canvas kütüphanesi görsel fiş oluşturmak için -->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
 <style>
 :root {
 --primary-color: #2c3e50;
 --accent-color: #27ae60;
 --bg-color: #f4f6f7;
 --card-bg: #ffffff;
 }
 body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: #333; }
 .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
 h1, h2 { color: var(--primary-color); text-align: center; margin-bottom: 20px; }
 
 /* Form Elemanları */
 .form-group { margin-bottom: 15px; }
 label { display: block; margin-bottom: 5px; font-weight: 600; }
 select, input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
 .row { display: flex; gap: 10px; flex-wrap: wrap; }
 .col { flex: 1; min-width: 150px; }

 /* Tablo */
 table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
 th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
 th { background-color: var(--primary-color); color: white; }
 .btn-remove { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

 /* Butonlar */
 .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
 .btn-add { background-color: var(--accent-color); color: white; }
 .btn-generate { background-color: #3498db; color: white; margin-top: 10px; }
 .btn-whatsapp { background-color: #25D366; color: white; margin-top: 10px; }
 .btn:hover { opacity: 0.9; }

 /* Satış Fişi Görünümü (Gizli, sadece çıktı için) */
 #receipt-preview {
 display: none; /* Normalde gizli, sadece çıktıda görünür */
 width: 300px;
 background: white;
 padding: 20px;
 border: 1px solid #ddd;
 font-family: 'Courier New', Courier, monospace;
 margin-top: 20px;
 }
 .receipt-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
 .receipt-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
 .receipt-total { border-top: 2px dashed #000; padding-top: 10px; font-weight: bold; margin-top: 10px; }
 
 /* Mobil Uyum */
 @media (max-width: 600px) {
 .row { flex-direction: column; }
 th, td { font-size: 12px; padding: 5px; }
 }
 </style>
</head>
<body>

<div class="container">
 <h1>Suveren Sipariş Girişi</h1>
 
 <!-- Müşteri Seçimi -->
 <div class="form-group">
 <label>Müşteri Seçin:</label>
 <select id="customerSelect" onchange="updateCustomerInfo()">
 <option value="">-- Müşteri Seçiniz --</option>
 <!-- JS ile doldurulacak -->
 </select>
 </div>

 <!-- Ürün Ekleme -->
 <div class="row">
 <div class="col form-group">
 <label>Ürün Seçin:</label>
 <select id="productSelect"></select>
 </div>
 <div class="col form-group">
 <label>Adet:</label>
 <input type="number" id="quantity" value="1" min="1">
 </div>
 <div class="col form-group">
 <label>Ürün İndirim (%)</label>
 <input type="number" id="itemDiscount" value="0" min="0" max="100">
 </div>
 </div>
 <button class="btn btn-add" onclick="addProduct()">+ Ürünü Ekle</button>

 <!-- Ürün Listesi -->
 <table id="orderTable">
 <thead>
 <tr>
 <th>Ürün</th>
 <th>Adet</th>
 <th>Birim Fiyat</th>
 <th>İndirim</th>
 <th>Tutar</th>
 <th>Sil</th>
 </tr>
 </thead>
 <tbody></tbody>
 </table>

 <!-- Genel İndirim ve Toplam -->
 <div class="row" style="margin-top: 20px;">
 <div class="col form-group">
 <label>Genel İndirim (%):</label>
 <input type="number" id="generalDiscount" value="0" min="0" max="100" onchange="calculateTotals()">
 </div>
 <div class="col form-group">
 <label>KDV Oranı:</label>
 <select id="kdvRate" onchange="calculateTotals()">
 <option value="0">%0</option>
 <option value="1">%1</option>
 <option value="10">%10</option>
 <option value="20">%20</option>
 </select>
 </div>
 </div>

 <div style="text-align: right; font-size: 1.2em; font-weight: bold; margin-top: 10px;">
 Toplam Tutar: <span id="grandTotal">0,00</span> TL
 </div>

 <!-- Aksiyon Butonları -->
 <button class="btn btn-generate" onclick="generateXML()">XML Oluştur & İndir</button>
 <button class="btn btn-whatsapp" onclick="generateReceiptAndShare()">Fişi WhatsApp'tan Gönder</button>
</div>

<!-- Gizli Fiş Tasarımı -->
<div id="receipt-preview">
 <div class="receipt-header">
 <h3>SUVEREN SATIŞ FİŞİ</h3>
 <p id="rec-date"></p>
 <p><strong>Müşteri:</strong> <span id="rec-customer"></span></p>
 </div>
 <div id="rec-items"></div>
 <div class="receipt-total">
 <div class="receipt-item"><span>Toplam:</span> <span id="rec-total"></span></div>
 </div>
 <div style="text-align: center; margin-top: 10px; font-size: 10px;">
 Teşekkürler!
 </div>
</div>
