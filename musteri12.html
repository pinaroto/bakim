<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pınar Oto Bakım — Araç Sorgulama</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

:root{
  --red:#c0392b;
  --red-dark:#96281b;
  --gold:#f39c12;
  --gold-light:#f8c055;
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --text:#f0f0f0;
  --text2:#888;
  --success:#2ecc71;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  font-family:var(--font-body);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ── Arka plan dokusu ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(192,57,43,.18) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
}

/* ── Header ── */
header{
  width:100%;
  max-width:700px;
  padding:32px 20px 0;
  text-align:center;
  position:relative;
  z-index:1;
}

.logo-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin-bottom:20px;
}

.logo-icon{
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  box-shadow:0 4px 20px rgba(192,57,43,.4);
  flex-shrink:0;
}

.logo-text h1{
  font-family:var(--font-display);
  font-size:1.9rem;
  font-weight:900;
  letter-spacing:1px;
  color:var(--text);
  line-height:1;
  text-transform:uppercase;
}
.logo-text p{
  font-size:.78rem;
  color:var(--text2);
  margin-top:4px;
  letter-spacing:.5px;
}

/* ── Arama kutusu ── */
.search-section{
  width:100%;
  max-width:700px;
  padding:0 20px;
  margin-top:28px;
  position:relative;
  z-index:1;
}

.search-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
}

.search-label{
  font-family:var(--font-display);
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:1px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}

.plate-input-wrap{
  display:flex;
  gap:10px;
  align-items:stretch;
}

.plate-input{
  flex:1;
  padding:14px 18px;
  background:var(--surface2);
  border:2px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:var(--font-display);
  font-size:1.4rem;
  font-weight:700;
  letter-spacing:4px;
  text-transform:uppercase;
  transition:.2s;
  outline:none;
}
.plate-input::placeholder{
  color:#444;
  font-weight:400;
  letter-spacing:2px;
  font-size:1.1rem;
}
.plate-input:focus{
  border-color:var(--red);
  background:#1a1a1a;
  box-shadow:0 0 0 3px rgba(192,57,43,.15);
}

.search-btn{
  padding:14px 28px;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  border:none;
  border-radius:10px;
  color:#fff;
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(192,57,43,.3);
}
.search-btn:hover{
  background:linear-gradient(135deg,var(--red-dark),#7a1f12);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(192,57,43,.4);
}
.search-btn:active{transform:translateY(0);}
.search-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.search-hint{
  margin-top:10px;
  font-size:.76rem;
  color:var(--text2);
  text-align:center;
}

/* ── Sonuçlar ── */
.results-section{
  width:100%;
  max-width:700px;
  padding:20px 20px 40px;
  position:relative;
  z-index:1;
}

/* Yükleniyor */
.loading-state{
  text-align:center;
  padding:48px 20px;
  color:var(--text2);
}
.spinner{
  width:40px;height:40px;
  border:3px solid var(--border);
  border-top-color:var(--red);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Boş durum */
.empty-state{
  text-align:center;
  padding:48px 20px;
  color:var(--text2);
}
.empty-state .icon{font-size:3rem;margin-bottom:12px;display:block;}
.empty-state p{font-size:.9rem;line-height:1.6;}

/* Araç bulunamadı */
.not-found{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  text-align:center;
}
.not-found .icon{font-size:2.5rem;display:block;margin-bottom:12px;}
.not-found h3{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.not-found p{font-size:.85rem;color:var(--text2);line-height:1.6;}

/* Araç başlık kartı */
.vehicle-header{
  background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);
  border-radius:14px;
  padding:20px 24px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  box-shadow:0 6px 24px rgba(192,57,43,.3);
}
.vehicle-plate{
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.25);
  border-radius:8px;
  padding:8px 20px;
  font-family:'Courier New',monospace;
  font-size:1.5rem;
  font-weight:800;
  color:#fff;
  letter-spacing:3px;
}
.vehicle-info h2{
  font-family:var(--font-display);
  font-size:1.3rem;
  font-weight:700;
  color:#fff;
  letter-spacing:.5px;
}
.vehicle-info p{
  font-size:.8rem;
  color:rgba(255,255,255,.75);
  margin-top:2px;
}
.record-count{
  margin-left:auto;
  background:rgba(255,255,255,.15);
  border-radius:20px;
  padding:4px 14px;
  font-size:.75rem;
  font-weight:600;
  color:#fff;
  white-space:nowrap;
}

/* Bakım kayıt kartı */
.bakim-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:14px;
  transition:.2s;
}
.bakim-card:hover{
  border-color:#3a3a3a;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}

.bakim-card-header{
  background:var(--surface2);
  padding:12px 18px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}

.bakim-no{
  background:var(--red);
  color:#fff;
  border-radius:6px;
  padding:2px 10px;
  font-family:var(--font-display);
  font-size:.85rem;
  font-weight:700;
  letter-spacing:.5px;
}

.bakim-tarih{
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:600;
  color:var(--text);
  letter-spacing:.5px;
}

.durum-badge{
  margin-left:auto;
  padding:3px 12px;
  border-radius:20px;
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
}
.durum-badge.ok{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.durum-badge.yakin{background:rgba(243,156,18,.15);color:var(--gold);border:1px solid rgba(243,156,18,.3);}
.durum-badge.gecti{background:rgba(192,57,43,.15);color:#e74c3c;border:1px solid rgba(192,57,43,.3);}

.bakim-card-body{
  padding:16px 18px;
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px 20px;
}

.info-item{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.info-item .lbl{
  font-size:.68rem;
  font-weight:600;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:.6px;
}
.info-item .val{
  font-size:.88rem;
  color:var(--text);
  font-weight:500;
}
.info-item .val.highlight{
  color:var(--gold);
  font-weight:600;
}

.section-divider{
  height:1px;
  background:var(--border);
  margin:14px 0;
}

.malzeme-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:8px;
}

.malzeme-chip{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 12px;
}
.malzeme-chip .m-lbl{
  font-size:.65rem;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:.5px;
  font-weight:600;
}
.malzeme-chip .m-val{
  font-size:.82rem;
  color:var(--text);
  font-weight:500;
  margin-top:2px;
}
.malzeme-chip.yag-chip{
  border-color:rgba(243,156,18,.3);
  background:rgba(243,156,18,.05);
}
.malzeme-chip.yag-chip .m-lbl{color:var(--gold);}
.malzeme-chip.yag-chip .m-val{color:var(--gold-light);}

/* Footer */
footer{
  width:100%;
  text-align:center;
  padding:20px;
  font-size:.75rem;
  color:#444;
  position:relative;
  z-index:1;
  border-top:1px solid var(--border);
  margin-top:auto;
}
footer span{color:var(--red);}

/* Mobil */
@media(max-width:500px){
  .plate-input-wrap{flex-direction:column;}
  .search-btn{width:100%;}
  .info-grid{grid-template-columns:1fr 1fr;}
  .malzeme-grid{grid-template-columns:1fr 1fr;}
  .vehicle-header{flex-direction:column;text-align:center;}
  .record-count{margin-left:0;}
}
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">🔧</div>
    <div class="logo-text">
      <h1>Pınar Oto Bakım</h1>
      <p>İncesu / KAYSERİ &nbsp;·&nbsp; 0 506 099 67 43</p>
    </div>
  </div>
</header>

<div class="search-section">
  <div class="search-card">
    <div class="search-label">🔍 Araç Bakım Sorgulama</div>
    <div class="plate-input-wrap">
      <input
        class="plate-input"
        id="plakaInput"
        type="text"
        placeholder="34 ABC 1234"
        maxlength="10"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')sorguYap()"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="search-btn" id="sorguBtn" onclick="sorguYap()">Sorgula</button>
    </div>
    <p class="search-hint">Araç plaka numaranızı yazarak tüm bakım geçmişinizi görüntüleyebilirsiniz.</p>
  </div>
</div>

<div class="results-section" id="resultsSection"></div>

<footer>
  <span>Pınar Oto Bakım Servisi</span> — Küçük Sanayi Sitesi, İncesu / KAYSERİ<br>
  Mehmet Taşcı · 0 506 099 67 43
</footer>

<script src="veritabani.js"></script>
<script>
function bakimDurumu(kayit){
  if(!kayit.sonrakiBakimTarihi||kayit.sonrakiBakimTarihi==='İşlem yapılmadı') return null;
  const bugun=new Date(); bugun.setHours(0,0,0,0);
  const hedef=new Date(kayit.sonrakiBakimTarihi);
  if(isNaN(hedef)) return null;
  return Math.round((hedef-bugun)/(1000*60*60*24));
}

function tarihFormatla(t){
  if(!t||t==='İşlem yapılmadı') return '—';
  // YYYY-MM-DD formatını DD.MM.YYYY'ye çevir
  if(/^\d{4}-\d{2}-\d{2}$/.test(t)){
    const [y,m,d]=t.split('-');
    return `${d}.${m}.${y}`;
  }
  return t;
}

function degerGoster(v){
  if(!v||v==='İşlem yapılmadı') return '—';
  return v;
}

async function sorguYap(){
  const plaka=document.getElementById('plakaInput').value.trim().toUpperCase().replace(/\s+/g,'');
  if(plaka.length<4){
    document.getElementById('resultsSection').innerHTML=
      '<div class="not-found"><span class="icon">⚠️</span><h3>Geçersiz Plaka</h3><p>Lütfen geçerli bir plaka numarası girin.</p></div>';
    return;
  }

  const btn=document.getElementById('sorguBtn');
  btn.disabled=true;
  document.getElementById('resultsSection').innerHTML=
    '<div class="loading-state"><div class="spinner"></div><p>Sorgulanıyor...</p></div>';

  try{
    const kayitlar=await db_plakaAra(plaka);

    if(kayitlar.length===0){
      document.getElementById('resultsSection').innerHTML=`
        <div class="not-found">
          <span class="icon">🔍</span>
          <h3>${plaka} — Kayıt Bulunamadı</h3>
          <p>Bu plakaya ait bakım kaydı sistemimizde bulunmamaktadır.<br>
          Bilgi için lütfen servisimizi arayın: <strong>0 506 099 67 43</strong></p>
        </div>`;
      return;
    }

    // Araç bilgisini ilk kayıttan al
    const arac=kayitlar[0];

    // Her kaydın kart HTML'i
    const kartlar=kayitlar.map((k,i)=>{
      const f=bakimDurumu(k);
      let durumBadge='';
      if(f!==null){
        if(f<0) durumBadge=`<span class="durum-badge gecti">⚠️ ${Math.abs(f)} gün geçti</span>`;
        else if(f===0) durumBadge='<span class="durum-badge yakin">⏰ BUGÜN</span>';
        else if(f<=30) durumBadge=`<span class="durum-badge yakin">⏰ ${f} gün kaldı</span>`;
        else durumBadge=`<span class="durum-badge ok">✅ ${f} gün</span>`;
      }
      const bakimNo=kayitlar.length-i;
      return `
<div class="bakim-card">
  <div class="bakim-card-header">
    <span class="bakim-no">#${bakimNo}. Bakım</span>
    <span class="bakim-tarih">📅 ${tarihFormatla(k.bakimTarihi)}</span>
    ${durumBadge}
  </div>
  <div class="bakim-card-body">
    <div class="info-grid">
      <div class="info-item">
        <span class="lbl">Bakım Km</span>
        <span class="val">${degerGoster(k.bakimKm)} km</span>
      </div>
      <div class="info-item">
        <span class="lbl">Sonraki Bakım Tarihi</span>
        <span class="val highlight">${tarihFormatla(k.sonrakiBakimTarihi)}</span>
      </div>
      <div class="info-item">
        <span class="lbl">Sonraki Bakım Km</span>
        <span class="val highlight">${degerGoster(k.sonrakiBakimKm)} km</span>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="malzeme-grid">
      <div class="malzeme-chip yag-chip">
        <div class="m-lbl">🛢️ Motor Yağı</div>
        <div class="m-val">${degerGoster(k.yag)}</div>
      </div>
      <div class="malzeme-chip">
        <div class="m-lbl">🔩 Yağ Filtresi</div>
        <div class="m-val">${degerGoster(k.yagFiltresi)}</div>
      </div>
      <div class="malzeme-chip">
        <div class="m-lbl">⛽ Yakıt Filtresi</div>
        <div class="m-val">${degerGoster(k.yakitFiltresi)}</div>
      </div>
      <div class="malzeme-chip">
        <div class="m-lbl">🌿 Polen Filtresi</div>
        <div class="m-val">${degerGoster(k.polenFiltresi)}</div>
      </div>
      <div class="malzeme-chip">
        <div class="m-lbl">💨 Hava Filtresi</div>
        <div class="m-val">${degerGoster(k.havaFiltresi)}</div>
      </div>
    </div>
  </div>
</div>`;
    }).join('');

    document.getElementById('resultsSection').innerHTML=`
      <div class="vehicle-header">
        <div class="vehicle-plate">${arac.plaka}</div>
        <div class="vehicle-info">
          <h2>${degerGoster(arac.markaModel)}</h2>
          <p>${degerGoster(arac.modelYili)} · Motor: ${degerGoster(arac.motorNo)}</p>
        </div>
        <span class="record-count">${kayitlar.length} Bakım Kaydı</span>
      </div>
      ${kartlar}
    `;

  }catch(e){
    document.getElementById('resultsSection').innerHTML=
      `<div class="not-found"><span class="icon">❌</span><h3>Bağlantı Hatası</h3><p>${e.message}</p></div>`;
  }finally{
    btn.disabled=false;
  }
}

// URL'den plaka parametresi varsa otomatik sorgula (?plaka=34ABC123)
window.addEventListener('DOMContentLoaded',()=>{
  const params=new URLSearchParams(window.location.search);
  const plaka=params.get('plaka');
  if(plaka){
    document.getElementById('plakaInput').value=plaka.toUpperCase();
    sorguYap();
  }
});
</script>
</body>
</html>
